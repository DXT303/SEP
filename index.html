<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Separator · KFL Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa; --white: #ffffff; --accent: #2563eb;
    --accent-light: #eff6ff; --accent-hover: #1d4ed8;
    --text: #111827; --muted: #6b7280; --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(0,0,0,.07); --radius: 14px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 62px;
  }
  .nav-brand { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -.3px; }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { text-decoration: none; font-size: 13px; font-weight: 500; color: var(--muted); padding: 7px 14px; border-radius: 8px; transition: all .2s; }
  .nav-links a:hover { color: var(--text); background: var(--bg); }
  .nav-links a.active { color: var(--accent); background: var(--accent-light); }

  /* PAGE HERO */
  .page-hero { max-width: 1100px; margin: 0 auto; padding: 60px 40px 40px; }
  .page-tag { display: inline-flex; align-items: center; gap: 7px; background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 16px; }
  .page-tag::before { content: ''; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .page-hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
  .page-hero h1 span { color: var(--accent); }
  .page-hero p { font-size: 15px; color: var(--muted); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 0 40px 60px; }

  /* UPLOAD CARD */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 10px; padding: 40px 24px;
    text-align: center; transition: border-color .2s, background .2s; cursor: pointer;
  }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone input { display: none; }
  .upload-zone label { cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--muted); }
  #file-name { font-size: 12px; color: var(--accent); margin-top: 10px; font-weight: 500; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.3); }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #047857; transform: translateY(-1px); }
  .btn-orange { background: #d97706; color: #fff; }
  .btn-orange:hover { background: #b45309; transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ERROR */
  #error { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; }

  /* DOWNLOAD BAR */
  .dl-bar { display: none; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 24px; margin-bottom: 0; border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
  .dl-bar.visible { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .dl-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }

  /* TABS */
  .tabs-wrap { background: var(--white); border: 1px solid var(--border); border-top: none; border-bottom: none; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tab-btn {
    padding: 10px 18px; cursor: pointer; background: transparent;
    border: none; border-bottom: 2px solid transparent;
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: all .2s; font-family: 'Inter', sans-serif;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* SHEET */
  .sheet { display: none; background: var(--white); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 24px; overflow-x: auto; }
  .sheet.active { display: block; }
  .count { font-size: 12px; color: var(--muted); margin-bottom: 14px; font-weight: 500; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { background: var(--accent); color: #fff; padding: 10px 12px; text-align: center; font-size: 12px; font-weight: 600; border: 1px solid var(--accent-hover); }
  td { padding: 9px 12px; border: 1px solid var(--border); text-align: center; font-size: 13px; }
  tr:nth-child(even) td { background: #fafbff; }
  tr:hover td { background: var(--accent-light); }
  .badge-in  { background: #d1fae5; color: #065f46; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-out { background: #fef3c7; color: #92400e; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .page-hero, .main { padding-left: 16px; padding-right: 16px; }
    .page-hero h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="home.html">KFL <span>Organizer</span></a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="index.html" class="active">Date Separator</a>
    <a href="department.html">Client Separator</a>
    <a href="home.html#about">About</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-tag">Date Separator</div>
  <h1>Organize by <span>Date</span></h1>
  <p>Upload your Excel file and records will be automatically grouped into separate sheets by date.</p>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Upload File</div>
    <div class="upload-zone">
      <label for="fileInput">
        <div class="upload-icon">📂</div>
        <h3>Click to upload your Excel file</h3>
        <p>Supports .xlsx, .xls, .csv</p>
        <p id="file-name"></p>
      </label>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    </div>
  </div>

  <div id="error"></div>

  <div class="dl-bar" id="downloadBar">
    <span class="dl-label">Download</span>
    <button class="btn btn-orange" onclick="downloadAll()">⬇ All Sheets</button>
    <span id="sheetBtns" style="display:flex;gap:8px;flex-wrap:wrap;"></span>
  </div>

  <div class="tabs-wrap" id="tabs"></div>
  <div id="sheets"></div>

</div>

<script>
const fileInput = document.getElementById('fileInput');
const tabsEl    = document.getElementById('tabs');
const sheetsEl  = document.getElementById('sheets');
const errorEl   = document.getElementById('error');

fileInput.addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = '✓ ' + file.name;
  errorEl.style.display = 'none';
  tabsEl.innerHTML = '';
  sheetsEl.innerHTML = '';
  document.getElementById('sheetBtns').innerHTML = '';
  document.getElementById('downloadBar').classList.remove('visible');

  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];

      let rows = [];
      for (let skip = 0; skip <= 10; skip++) {
        const sample = XLSX.utils.sheet_to_json(ws, { defval: '-', range: skip });
        if (sample.length && Object.keys(sample[0]).find(h => /date/i.test(h))) { rows = sample; break; }
      }
      if (!rows.length) rows = XLSX.utils.sheet_to_json(ws, { defval: '-' });
      if (!rows.length) throw new Error('No data found in the file.');

      const headers = Object.keys(rows[0]);
      const dateKey = headers.find(h => /date/i.test(h));
      if (!dateKey) throw new Error('No "Date" column found. Detected columns: ' + headers.join(', '));

      function normalizeDate(val) {
        if (val instanceof Date) return `${String(val.getDate()).padStart(2,'0')}-${String(val.getMonth()+1).padStart(2,'0')}-${val.getFullYear()}`;
        return String(val).replace(/\s+/g, '').trim();
      }

      const grouped = {};
      rows.forEach(r => {
        const d = normalizeDate(r[dateKey]);
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(r);
      });

      const dates = Object.keys(grouped).sort((a, b) => {
        const parse = s => { const p = s.split(/[-\/]/); return p.length === 3 && p[2].length === 4 ? new Date(p[2], p[1]-1, p[0]) : new Date(s); };
        return parse(a) - parse(b);
      });

      const typeKey = headers.find(h => /type|swipe|status/i.test(h));
      window._grouped = grouped; window._headers = headers; window._dates = dates; window._normalizeDate = normalizeDate;

      const sheetBtns = document.getElementById('sheetBtns');
      dates.forEach(date => {
        const b = document.createElement('button');
        b.className = 'btn btn-success';
        b.style.cssText = 'padding:7px 14px;font-size:12px;';
        b.textContent = '⬇ ' + date;
        b.onclick = () => downloadSheet(date);
        sheetBtns.appendChild(b);
      });
      document.getElementById('downloadBar').classList.add('visible');

      dates.forEach((date, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = date;
        btn.onclick = () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('sheet-' + i).classList.add('active');
        };
        tabsEl.appendChild(btn);

        const sheetRows = grouped[date];
        const div = document.createElement('div');
        div.className = 'sheet' + (i === 0 ? ' active' : '');
        div.id = 'sheet-' + i;

        let html = `<p class="count">${sheetRows.length} record${sheetRows.length !== 1 ? 's' : ''}</p><table><thead><tr>`;
        headers.forEach(h => { html += `<th>${h}</th>`; });
        html += '</tr></thead><tbody>';
        sheetRows.forEach(r => {
          html += '<tr>';
          headers.forEach(h => {
            let val = r[h] instanceof Date ? normalizeDate(r[h]) : (r[h] ?? '-');
            if (typeKey && h === typeKey) val = /in/i.test(String(val)) ? `<span class="badge-in">${val}</span>` : `<span class="badge-out">${val}</span>`;
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        div.innerHTML = html;
        sheetsEl.appendChild(div);
      });

    } catch (err) {
      errorEl.textContent = '⚠ ' + err.message;
      errorEl.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
});

function buildWorksheet(date) {
  const nd = window._normalizeDate;
  return XLSX.utils.aoa_to_sheet([window._headers, ...window._grouped[date].map(r => window._headers.map(h => r[h] instanceof Date ? nd(r[h]) : (r[h] ?? '-')))]);
}
function downloadSheet(date) {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, buildWorksheet(date), date.replace(/[\/\\:?*\[\]]/g, '-'));
  XLSX.writeFile(wb, `Attendance_${date}.xlsx`);
}
function downloadAll() {
  const wb = XLSX.utils.book_new();
  window._dates.forEach(date => XLSX.utils.book_append_sheet(wb, buildWorksheet(date), date.replace(/[\/\\:?*\[\]]/g, '-')));
  XLSX.writeFile(wb, 'Attendance_All_Sheets.xlsx');
}
</script>
</body>
</html>
