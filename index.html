<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFL Manpower Agency</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; background: #f0f2f5; min-height: 100vh; }

  /* ── Top bar ── */
  .topbar { background: #1a6bb5; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .topbar h1 { font-size: 16px; font-weight: bold; letter-spacing: .5px; }
  .topbar span { font-size: 12px; opacity: .75; }

  /* ── Page wrapper ── */
  .page { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

  /* ── Card ── */
  .card { background: #fff; border: 1px solid #dde3ec; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .4px; }

  /* ── Upload area ── */
  .upload-area { border: 2px dashed #b0c4de; border-radius: 6px; padding: 28px; text-align: center; }
  .upload-area input { display: none; }
  .upload-area p { font-size: 12px; color: #888; margin-top: 10px; }
  #file-name { font-size: 12px; color: #333; margin-top: 6px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; transition: background .2s, opacity .2s; }
  .btn-primary { background: #1a6bb5; color: #fff; }
  .btn-primary:hover { background: #1558a0; }
  .btn-success { background: #217346; color: #fff; }
  .btn-success:hover { background: #185c38; }
  .btn-orange  { background: #e07b00; color: #fff; }
  .btn-orange:hover  { background: #c46c00; }

  /* ── Download bar ── */
  .dl-bar { display: none; flex-wrap: wrap; align-items: center; gap: 8px; padding: 14px 24px; background: #fff; border: 1px solid #dde3ec; border-bottom: none; border-radius: 8px 8px 0 0; margin-bottom: 0; }
  .dl-bar.visible { display: flex; }
  .dl-label { font-size: 12px; color: #666; font-weight: bold; margin-right: 4px; }

  /* ── Tabs ── */
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 24px; background: #fff; border-left: 1px solid #dde3ec; border-right: 1px solid #dde3ec; }
  .tab-btn { padding: 8px 18px; cursor: pointer; background: #f0f2f5; border: 1px solid #dde3ec; border-bottom: none; border-radius: 5px 5px 0 0; font-size: 13px; font-weight: bold; color: #555; transition: background .15s; }
  .tab-btn.active { background: #fff; color: #1a6bb5; border-bottom: 2px solid #fff; }
  .tab-btn:hover:not(.active) { background: #e8f0fb; }

  /* ── Sheet panel ── */
  .sheet { display: none; background: #fff; border: 1px solid #dde3ec; border-radius: 0 0 8px 8px; padding: 20px; overflow-x: auto; }
  .sheet.active { display: block; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { background: #1a6bb5; color: #fff; padding: 8px 10px; text-align: center; border: 1px solid #1558a0; font-size: 12px; }
  td { padding: 7px 10px; border: 1px solid #e0e6ef; text-align: center; vertical-align: middle; }
  tr:nth-child(even) td { background: #f5f9ff; }
  tr:hover td { background: #e8f0fb; }

  /* ── Badges ── */
  .badge-in  { background: #d4edda; color: #155724; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .badge-out { background: #fff3cd; color: #856404; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .count { font-size: 12px; color: #888; margin-bottom: 10px; }

  /* ── Error ── */
  #error { display: none; color: #c0392b; background: #fdf0ef; border: 1px solid #f5c6c2; border-radius: 5px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>KFL MANPOWER AGENCY</h1>
  <span>/ Date Separator</span>
  <a href="department.html" style="margin-left:auto; background:#fff; color:#1a6bb5; padding:6px 16px; border-radius:5px; font-size:12px; font-weight:bold; text-decoration:none;">⇄ Client Separator</a>
</div>

<div class="page">

  <div class="card">
    <div class="card-title">Upload File</div>
    <div class="upload-area">
      <label for="fileInput" class="btn btn-primary">📂 Choose Excel File</label>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      <p id="file-name">No file selected. Supports .xlsx, .xls, .csv</p>
    </div>
  </div>

  <div id="error"></div>

  <!-- Download bar -->
  <div class="dl-bar" id="downloadBar">
    <span class="dl-label">Download:</span>
    <button class="btn btn-orange" onclick="downloadAll()">⬇ All Sheets (one file)</button>
    <span id="sheetBtns" style="display:flex;gap:6px;flex-wrap:wrap;"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Sheets -->
  <div id="sheets"></div>

</div>

<script>
const fileInput  = document.getElementById('fileInput');
const tabsEl     = document.getElementById('tabs');
const sheetsEl   = document.getElementById('sheets');
const errorEl    = document.getElementById('error');

fileInput.addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  errorEl.style.display = 'none';
  tabsEl.innerHTML = '';
  sheetsEl.innerHTML = '';
  document.getElementById('sheetBtns').innerHTML = '';
  document.getElementById('downloadBar').classList.remove('visible');

  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];

      // Auto-scan rows 0–10 for the real header row (one containing "date")
      let rows = [];
      for (let skip = 0; skip <= 10; skip++) {
        const sample = XLSX.utils.sheet_to_json(ws, { defval: '-', range: skip });
        if (sample.length && Object.keys(sample[0]).find(h => /date/i.test(h))) {
          rows = sample; break;
        }
      }
      if (!rows.length) rows = XLSX.utils.sheet_to_json(ws, { defval: '-' });
      if (!rows.length) throw new Error('No data found in the file.');

      const headers = Object.keys(rows[0]);
      const dateKey = headers.find(h => /date/i.test(h));
      if (!dateKey) throw new Error('No "Date" column found. Detected columns: ' + headers.join(', '));

      function normalizeDate(val) {
        if (val instanceof Date) {
          return `${String(val.getDate()).padStart(2,'0')}-${String(val.getMonth()+1).padStart(2,'0')}-${val.getFullYear()}`;
        }
        return String(val).replace(/\s+/g, '').trim();
      }

      // Group by date
      const grouped = {};
      rows.forEach(r => {
        const d = normalizeDate(r[dateKey]);
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(r);
      });

      // Sort dates chronologically
      const dates = Object.keys(grouped).sort((a, b) => {
        const parse = s => {
          const p = s.split(/[-\/]/);
          return p.length === 3 && p[2].length === 4
            ? new Date(p[2], p[1]-1, p[0])
            : new Date(s);
        };
        return parse(a) - parse(b);
      });

      const typeKey = headers.find(h => /type|swipe|status/i.test(h));

      // Store for download
      window._grouped = grouped;
      window._headers = headers;
      window._dates   = dates;
      window._normalizeDate = normalizeDate;

      // Per-sheet download buttons
      const sheetBtns = document.getElementById('sheetBtns');
      dates.forEach(date => {
        const b = document.createElement('button');
        b.className = 'btn btn-success';
        b.style.cssText = 'padding:6px 14px;font-size:12px;';
        b.textContent = '⬇ ' + date;
        b.onclick = () => downloadSheet(date);
        sheetBtns.appendChild(b);
      });
      document.getElementById('downloadBar').classList.add('visible');

      // Build tabs + sheets
      dates.forEach((date, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = date;
        btn.onclick = () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('sheet-' + i).classList.add('active');
        };
        tabsEl.appendChild(btn);

        const sheetRows = grouped[date];
        const div = document.createElement('div');
        div.className = 'sheet' + (i === 0 ? ' active' : '');
        div.id = 'sheet-' + i;

        let html = `<p class="count">Total records: ${sheetRows.length}</p><table><thead><tr>`;
        headers.forEach(h => { html += `<th>${h}</th>`; });
        html += '</tr></thead><tbody>';

        sheetRows.forEach(r => {
          html += '<tr>';
          headers.forEach(h => {
            let val = r[h] instanceof Date ? normalizeDate(r[h]) : (r[h] ?? '-');
            if (typeKey && h === typeKey) {
              val = /in/i.test(String(val))
                ? `<span class="badge-in">${val}</span>`
                : `<span class="badge-out">${val}</span>`;
            }
            html += `<td>${val}</td>`;
          });
          html += '</tr>';
        });

        html += '</tbody></table>';
        div.innerHTML = html;
        sheetsEl.appendChild(div);
      });

    } catch (err) {
      errorEl.textContent = '⚠ ' + err.message;
      errorEl.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
});

function buildWorksheet(date) {
  const nd   = window._normalizeDate;
  const data = [window._headers, ...window._grouped[date].map(r =>
    window._headers.map(h => r[h] instanceof Date ? nd(r[h]) : (r[h] ?? '-'))
  )];
  return XLSX.utils.aoa_to_sheet(data);
}

function downloadSheet(date) {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, buildWorksheet(date), date.replace(/[\/\\:?*\[\]]/g, '-'));
  XLSX.writeFile(wb, `Attendance_${date}.xlsx`);
}

function downloadAll() {
  const wb = XLSX.utils.book_new();
  window._dates.forEach(date => {
    XLSX.utils.book_append_sheet(wb, buildWorksheet(date), date.replace(/[\/\\:?*\[\]]/g, '-'));
  });
  XLSX.writeFile(wb, 'Attendance_All_Sheets.xlsx');
}
</script>
</body>
</html>
