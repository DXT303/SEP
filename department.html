<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Separator · KFL Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa; --white: #ffffff; --accent: #2563eb;
    --accent-light: #eff6ff; --accent-hover: #1d4ed8;
    --text: #111827; --muted: #6b7280; --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(0,0,0,.07); --radius: 14px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 62px;
  }
  .nav-brand { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -.3px; }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { text-decoration: none; font-size: 13px; font-weight: 500; color: var(--muted); padding: 7px 14px; border-radius: 8px; transition: all .2s; }
  .nav-links a:hover { color: var(--text); background: var(--bg); }
  .nav-links a.active { color: var(--accent); background: var(--accent-light); }

  /* PAGE HERO */
  .page-hero { max-width: 1100px; margin: 0 auto; padding: 60px 40px 40px; }
  .page-tag { display: inline-flex; align-items: center; gap: 7px; background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 16px; }
  .page-tag::before { content: ''; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .page-hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
  .page-hero h1 span { color: var(--accent); }
  .page-hero p { font-size: 15px; color: var(--muted); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 0 40px 60px; }

  /* CARD */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

  /* UPLOAD */
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 40px 24px; text-align: center; transition: border-color .2s, background .2s; }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone input { display: none; }
  .upload-zone label { cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--muted); }
  #file-name { font-size: 12px; color: var(--accent); margin-top: 10px; font-weight: 500; }

  /* ACTION ROW */
  .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; text-decoration: none; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.3); }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #047857; transform: translateY(-1px); }
  .btn-orange { background: #d97706; color: #fff; }
  .btn-orange:hover { background: #b45309; transform: translateY(-1px); }
  .btn-ghost { background: var(--white); color: var(--text); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ERROR */
  #error { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; }

  /* RESULT CARD */
  .result-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .result-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* SEARCH */
  .search-wrap { margin-bottom: 16px; position: relative; }
  .search-wrap input { width: 100%; padding: 10px 16px 10px 38px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; background: var(--bg); }
  .search-wrap input:focus { border-color: var(--accent); background: var(--white); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }

  /* CLIENT CARDS GRID */
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .client-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    display: flex; align-items: center; justify-content: space-between;
    transition: all .2s;
  }
  .client-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(37,99,235,.1); transform: translateY(-2px); }
  .client-info { display: flex; align-items: center; gap: 14px; }
  .client-avatar {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent-light); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .client-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .client-count { font-size: 12px; color: var(--muted); }
  .badge-count { background: var(--accent-light); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  /* NOT FOUND */
  #notFound { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* TABLE (view file) */
  #fileContent table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #fileContent th { background: var(--accent); color: #fff; padding: 8px 10px; text-align: left; }
  #fileContent td { padding: 7px 10px; border: 1px solid var(--border); }
  #fileContent tr:nth-child(even) td { background: #fafbff; }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .page-hero, .main { padding-left: 16px; padding-right: 16px; }
    .page-hero h1 { font-size: 28px; }
    .clients-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="home.html">KFL <span>Organizer</span></a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="index.html">Date Separator</a>
    <a href="department.html" class="active">Client Separator</a>
    <a href="home.html#about">About</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-tag">Client Separator</div>
  <h1>Organize by <span>Client</span></h1>
  <p>Upload your Excel file and records will be grouped by department or client. Download each one individually or all at once.</p>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Upload File</div>
    <div class="upload-zone">
      <label for="fileInput">
        <div class="upload-icon">📂</div>
        <h3>Click to upload your Excel file</h3>
        <p>Supports .xlsx, .xls</p>
        <p id="file-name"></p>
      </label>
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="updateFileName()">
    </div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="viewFile()">👁 View File</button>
      <button class="btn btn-primary" onclick="separateByDept()">⚡ Separate by Client</button>
      <button class="btn btn-ghost" onclick="printPDF()">🖨 Print PDF</button>
    </div>
  </div>

  <div id="error"></div>

  <!-- RESULT -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="result-header">
      <div class="result-title">Clients / Departments</div>
      <button class="btn btn-orange" id="downloadAllBtn" onclick="downloadAllFiles()">⬇ Download All as ZIP</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Search client or department…">
    </div>
    <div class="clients-grid" id="clientsGrid"></div>
    <div id="notFound">No clients match your search.</div>
  </div>

  <!-- FILE PREVIEW -->
  <div class="card" id="viewCard" style="display:none;">
    <div class="card-title">File Preview</div>
    <div id="fileContent" style="overflow-x:auto;"></div>
  </div>

</div>

<script>
let allDepartments = [];

function showError(msg) { const e = document.getElementById('error'); e.textContent = '⚠ ' + msg; e.style.display = 'block'; }
function clearError() { document.getElementById('error').style.display = 'none'; }
function updateFileName() {
  const f = document.getElementById('fileInput').files[0];
  document.getElementById('file-name').textContent = f ? '✓ ' + f.name : '';
}
function getFile() {
  const f = document.getElementById('fileInput').files[0];
  if (!f) { showError('Please upload a file first.'); return null; }
  return f;
}
function readFile(file, cb) { const r = new FileReader(); r.onload = e => cb(new Uint8Array(e.target.result)); r.readAsArrayBuffer(file); }

function findHeaderRow(sheet, range) {
  for (let row = range.s.r; row <= Math.min(range.s.r + 10, range.e.r); row++)
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = sheet[XLSX.utils.encode_cell({ r: row, c: col })];
      if (cell && /^id$/i.test(cell.v.toString().trim())) return row;
    }
  return null;
}

function getInitials(name) {
  return name.split(/[\s>_-]/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
}

function viewFile() {
  clearError(); const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    document.getElementById('fileContent').innerHTML = XLSX.utils.sheet_to_html(wb.Sheets[wb.SheetNames[0]]);
    document.getElementById('viewCard').style.display = 'block';
  });
}

function separateByDept() {
  clearError(); const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Could not find header row (ID column).'); return; }

    let deptCol = null;
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
      if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
    }
    if (deptCol === null) { showError('No "Department" column found.'); return; }

    const depts = {};
    for (let row = headerRow + 1; row <= range.e.r; row++) {
      const cell = ws[XLSX.utils.encode_cell({ r: row, c: deptCol })];
      if (!cell) continue;
      const val = cell.v.toString().trim().toUpperCase();
      const key = val.includes('AGRI-EXIM>PROJECT-BASE') ? 'PROJECT-BASE' : val.includes('AGRI-EXIM') ? 'AGRI-EXIM' : cell.v.toString().trim();
      depts[key] = (depts[key] || 0) + 1;
    }

    allDepartments = Object.keys(depts);
    const grid = document.getElementById('clientsGrid');
    grid.innerHTML = '';

    allDepartments.forEach(dept => {
      const card = document.createElement('div');
      card.className = 'client-card';
      card.dataset.name = dept.toLowerCase();
      card.innerHTML = `
        <div class="client-info">
          <div class="client-avatar">${getInitials(dept)}</div>
          <div>
            <div class="client-name">${dept}</div>
            <div class="client-count">${depts[dept]} record${depts[dept] !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <button class="btn btn-success" style="padding:7px 14px;font-size:12px;" onclick="handleAction('${dept.replace(/'/g,"\\'")}')">⬇ Download</button>`;
      grid.appendChild(card);
    });

    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('notFound').style.display = 'none';
  });
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('.client-card');
  let any = false;
  cards.forEach(c => { const match = c.dataset.name.includes(q); c.style.display = match ? '' : 'none'; if (match) any = true; });
  document.getElementById('notFound').style.display = any ? 'none' : 'block';
}

function buildFilteredWorkbook(ws, range, headerRow, deptCol, deptName) {
  const headers = [];
  for (let col = range.s.c; col <= range.e.c; col++) {
    const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
    headers.push(cell ? cell.v : '');
  }
  const now = new Date();
  const ts = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const meta = [['KFL MANPOWER AGENCY SERVER 3'],['Transaction'],[`Export Time: ${ts}`],['Operator: IT DEPARTMENT'],[],[`Department: ${deptName}`],[]];
  const rows = [headers];
  for (let row = headerRow + 1; row <= range.e.r; row++) {
    const cell = ws[XLSX.utils.encode_cell({ r: row, c: deptCol })];
    if (!cell) continue;
    if (cell.v.toString().trim().toUpperCase().includes(deptName.toUpperCase())) {
      const rowData = [];
      for (let col = range.s.c; col <= range.e.c; col++) { const c = ws[XLSX.utils.encode_cell({ r: row, c: col })]; rowData.push(c ? c.v : ''); }
      rows.push(rowData);
    }
  }
  const newWs = XLSX.utils.aoa_to_sheet([...meta, ...rows]);
  const newWb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWb, newWs, 'Data');
  return newWb;
}

function handleAction(deptName) {
  clearError(); const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Header row not found.'); return; }
    let deptCol = null;
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
      if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
    }
    const newWb = buildFilteredWorkbook(ws, range, headerRow, deptCol, deptName);
    XLSX.writeFile(newWb, `${deptName.replace(/[^a-zA-Z0-9]/g,'_')}_Data.xlsx`);
  });
}

async function downloadAllFiles() {
  if (!allDepartments.length) { showError('Please separate the file first.'); return; }
  const file = getFile(); if (!file) return;
  const btn = document.getElementById('downloadAllBtn');
  btn.disabled = true; btn.textContent = 'Creating ZIP…';
  readFile(file, async data => {
    try {
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const range = XLSX.utils.decode_range(ws['!ref']);
      const headerRow = findHeaderRow(ws, range);
      let deptCol = null;
      for (let col = range.s.c; col <= range.e.c; col++) {
        const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
        if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
      }
      const zip = new JSZip();
      allDepartments.forEach(dept => {
        const newWb = buildFilteredWorkbook(ws, range, headerRow, deptCol, dept);
        zip.file(`${dept.replace(/[^a-zA-Z0-9]/g,'_')}_Data.xlsx`, XLSX.write(newWb, { bookType: 'xlsx', type: 'array' }));
      });
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `All_Departments_${new Date().toISOString().slice(0,10)}.zip`;
      a.click();
    } catch(e) { showError(e.message); }
    finally { btn.disabled = false; btn.textContent = '⬇ Download All as ZIP'; }
  });
}

function printPDF() {
  clearError(); const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Header row not found.'); return; }
    const headers = [];
    for (let col = range.s.c; col <= range.e.c; col++) { const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })]; headers.push(cell ? cell.v : ''); }
    const rows = [];
    for (let row = headerRow + 1; row <= range.e.r; row++) {
      const rowData = [];
      for (let col = range.s.c; col <= range.e.c; col++) { const cell = ws[XLSX.utils.encode_cell({ r: row, c: col })]; rowData.push(cell ? cell.v : ''); }
      rows.push(rowData);
    }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt' });
    pdf.setFontSize(13);
    pdf.text('KFL MANPOWER AGENCY', pdf.internal.pageSize.width / 2, 28, { align: 'center' });
    pdf.autoTable({ head: [headers], body: rows, startY: 42, theme: 'grid', styles: { fontSize: 7, cellPadding: 3 }, headStyles: { fillColor: [37, 99, 235], textColor: 255 } });
    pdf.save('KFL_Attendance.pdf');
  });
}
</script>
</body>
</html>
