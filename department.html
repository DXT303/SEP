<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFL Manpower Agency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; background: #f0f2f5; min-height: 100vh; }

  /* ── Top bar ── */
  .topbar { background: #1a6bb5; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .topbar h1 { font-size: 16px; font-weight: bold; letter-spacing: .5px; }
  .topbar span { font-size: 12px; opacity: .75; }

  /* ── Page wrapper ── */
  .page { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

  /* ── Card ── */
  .card { background: #fff; border: 1px solid #dde3ec; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .4px; }

  /* ── Upload area ── */
  .upload-area { border: 2px dashed #b0c4de; border-radius: 6px; padding: 28px; text-align: center; }
  .upload-area input { display: none; }
  .upload-area p { font-size: 12px; color: #888; margin-top: 10px; }
  #file-name { font-size: 12px; color: #333; margin-top: 6px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; transition: background .2s, opacity .2s; }
  .btn-primary  { background: #1a6bb5; color: #fff; }
  .btn-primary:hover  { background: #1558a0; }
  .btn-success  { background: #217346; color: #fff; }
  .btn-success:hover  { background: #185c38; }
  .btn-orange   { background: #e07b00; color: #fff; }
  .btn-orange:hover   { background: #c46c00; }
  .btn-outline  { background: #fff; color: #1a6bb5; border: 1.5px solid #1a6bb5; }
  .btn-outline:hover  { background: #eef4fb; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Action row ── */
  .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

  /* ── Search ── */
  .search-wrap { margin-bottom: 14px; }
  .search-wrap input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: #1a6bb5; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }
  th { background: #1a6bb5; color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; border: 1px solid #1558a0; }
  td { padding: 7px 10px; border: 1px solid #e0e6ef; font-size: 13px; }
  tr:nth-child(even) td { background: #f5f9ff; }
  tr:hover td { background: #e8f0fb; }

  /* ── Badge ── */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .badge-count { background: #e8f0fb; color: #1a6bb5; }

  /* ── Not found ── */
  #notFound { display: none; text-align: center; padding: 30px; color: #888; font-size: 13px; }

  /* ── Error ── */
  #error { display: none; color: #c0392b; background: #fdf0ef; border: 1px solid #f5c6c2; border-radius: 5px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>KFL MANPOWER AGENCY</h1>
  <span>/ Department Separator</span>
  <a href="index.html" style="margin-left:auto; background:#fff; color:#1a6bb5; padding:6px 16px; border-radius:5px; font-size:12px; font-weight:bold; text-decoration:none;">⇄ Date Separator</a>
</div>

<div class="page">

  <div class="card">
    <div class="card-title">Upload File</div>
    <div class="upload-area">
      <label for="fileInput" class="btn btn-primary">📂 Choose Excel File</label>
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="updateFileName()">
      <p id="file-name">No file selected. Supports .xlsx, .xls</p>
    </div>
    <div class="action-row">
      <button class="btn btn-outline" onclick="viewFile()">👁 View File</button>
      <button class="btn btn-primary" onclick="separateByDept()">⚡ Separate by Department</button>
      <button class="btn btn-outline" onclick="printPDF()">🖨 Print PDF</button>
    </div>
  </div>

  <div id="error"></div>

  <div class="card" id="resultCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;">
      <div class="card-title" style="margin:0;">Departments</div>
      <button class="btn btn-orange" id="downloadAllBtn" onclick="downloadAllFiles()">⬇ Download All as ZIP</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search department…">
    </div>
    <table id="dataTable">
      <thead><tr><th>Department</th><th style="width:90px;text-align:center;">Records</th><th style="width:110px;text-align:center;">Action</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="notFound">No departments match your search.</div>
  </div>

  <div class="card" id="viewCard" style="display:none;">
    <div class="card-title">File Preview</div>
    <div id="fileContent" style="overflow-x:auto;"></div>
  </div>

</div>

<script>
let allDepartments = [];

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function clearError() { document.getElementById('error').style.display = 'none'; }

function updateFileName() {
  const f = document.getElementById('fileInput').files[0];
  document.getElementById('file-name').textContent = f ? f.name : 'No file selected.';
}

function getFile() {
  const f = document.getElementById('fileInput').files[0];
  if (!f) { showError('Please upload a file first.'); return null; }
  return f;
}

function readFile(file, cb) {
  const r = new FileReader();
  r.onload = e => cb(new Uint8Array(e.target.result));
  r.readAsArrayBuffer(file);
}

function findHeaderRow(sheet, range) {
  for (let row = range.s.r; row <= Math.min(range.s.r + 10, range.e.r); row++) {
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = sheet[XLSX.utils.encode_cell({ r: row, c: col })];
      if (cell && /^id$/i.test(cell.v.toString().trim())) return row;
    }
  }
  return null;
}

function viewFile() {
  clearError();
  const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    document.getElementById('fileContent').innerHTML = XLSX.utils.sheet_to_html(ws);
    document.getElementById('viewCard').style.display = 'block';
  });
}

function separateByDept() {
  clearError();
  const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Could not find header row (ID column).'); return; }

    let deptCol = null;
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
      if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
    }
    if (deptCol === null) { showError('No "Department" column found.'); return; }

    const depts = {};
    for (let row = headerRow + 1; row <= range.e.r; row++) {
      const cell = ws[XLSX.utils.encode_cell({ r: row, c: deptCol })];
      if (!cell) continue;
      let val = cell.v.toString().trim().toUpperCase();
      let key = val.includes('AGRI-EXIM>PROJECT-BASE') ? 'PROJECT-BASE'
               : val.includes('AGRI-EXIM') ? 'AGRI-EXIM'
               : cell.v.toString().trim();
      depts[key] = (depts[key] || 0) + 1;
    }

    allDepartments = Object.keys(depts);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    allDepartments.forEach(dept => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${dept}</td>
        <td style="text-align:center;"><span class="badge badge-count">${depts[dept]}</span></td>
        <td style="text-align:center;">
          <button class="btn btn-success" style="padding:5px 14px;font-size:12px;" onclick="handleAction('${dept.replace(/'/g,"\\'")}')">⬇ Download</button>
        </td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('notFound').style.display = 'none';
  });
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rows = document.getElementById('tableBody').querySelectorAll('tr');
  let any = false;
  rows.forEach(r => {
    const match = r.cells[0].textContent.toLowerCase().includes(q);
    r.style.display = match ? '' : 'none';
    if (match) any = true;
  });
  document.getElementById('notFound').style.display = any ? 'none' : 'block';
}

function buildFilteredWorkbook(ws, range, headerRow, deptCol, deptName) {
  const headers = [];
  for (let col = range.s.c; col <= range.e.c; col++) {
    const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
    headers.push(cell ? cell.v : '');
  }
  const now = new Date();
  const ts = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const meta = [
    ['KFL MANPOWER AGENCY SERVER 3'], ['Transaction'],
    [`Export Time: ${ts}`], ['Operator: IT DEPARTMENT'],
    [], [`Department: ${deptName}`], []
  ];
  const rows = [headers];
  for (let row = headerRow + 1; row <= range.e.r; row++) {
    const cell = ws[XLSX.utils.encode_cell({ r: row, c: deptCol })];
    if (!cell) continue;
    if (cell.v.toString().trim().toUpperCase().includes(deptName.toUpperCase())) {
      const rowData = [];
      for (let col = range.s.c; col <= range.e.c; col++) {
        const c = ws[XLSX.utils.encode_cell({ r: row, c: col })];
        rowData.push(c ? c.v : '');
      }
      rows.push(rowData);
    }
  }
  const newWs = XLSX.utils.aoa_to_sheet([...meta, ...rows]);
  const newWb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWb, newWs, 'Data');
  return newWb;
}

function handleAction(deptName) {
  clearError();
  const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Header row not found.'); return; }
    let deptCol = null;
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
      if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
    }
    const newWb = buildFilteredWorkbook(ws, range, headerRow, deptCol, deptName);
    XLSX.writeFile(newWb, `${deptName.replace(/[^a-zA-Z0-9]/g,'_')}_Data.xlsx`);
  });
}

async function downloadAllFiles() {
  if (!allDepartments.length) { showError('Please separate the file first.'); return; }
  const file = getFile(); if (!file) return;
  const btn = document.getElementById('downloadAllBtn');
  btn.disabled = true; btn.textContent = 'Creating ZIP…';
  readFile(file, async data => {
    try {
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const range = XLSX.utils.decode_range(ws['!ref']);
      const headerRow = findHeaderRow(ws, range);
      let deptCol = null;
      for (let col = range.s.c; col <= range.e.c; col++) {
        const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
        if (cell && /^department$/i.test(cell.v.toString().trim())) { deptCol = col; break; }
      }
      const zip = new JSZip();
      allDepartments.forEach(dept => {
        const newWb = buildFilteredWorkbook(ws, range, headerRow, deptCol, dept);
        const out = XLSX.write(newWb, { bookType: 'xlsx', type: 'array' });
        zip.file(`${dept.replace(/[^a-zA-Z0-9]/g,'_')}_Data.xlsx`, out);
      });
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `All_Departments_${new Date().toISOString().slice(0,10)}.zip`;
      a.click();
    } catch(e) { showError(e.message); }
    finally { btn.disabled = false; btn.textContent = '⬇ Download All as ZIP'; }
  });
}

function printPDF() {
  clearError();
  const file = getFile(); if (!file) return;
  readFile(file, data => {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const range = XLSX.utils.decode_range(ws['!ref']);
    const headerRow = findHeaderRow(ws, range);
    if (headerRow === null) { showError('Header row not found.'); return; }
    const headers = [];
    for (let col = range.s.c; col <= range.e.c; col++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c: col })];
      headers.push(cell ? cell.v : '');
    }
    const rows = [];
    for (let row = headerRow + 1; row <= range.e.r; row++) {
      const rowData = [];
      for (let col = range.s.c; col <= range.e.c; col++) {
        const cell = ws[XLSX.utils.encode_cell({ r: row, c: col })];
        rowData.push(cell ? cell.v : '');
      }
      rows.push(rowData);
    }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'pt' });
    pdf.setFontSize(13);
    pdf.text('KFL MANPOWER AGENCY', pdf.internal.pageSize.width / 2, 28, { align: 'center' });
    pdf.autoTable({ head: [headers], body: rows, startY: 42, theme: 'grid', styles: { fontSize: 7, cellPadding: 3 }, headStyles: { fillColor: [26, 107, 181], textColor: 255 } });
    pdf.save('KFL_Attendance.pdf');
  });
}
</script>
</body>
</html>
