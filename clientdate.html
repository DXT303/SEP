<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client + Date Separator · KFL Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fa; --white: #ffffff; --accent: #7c3aed;
    --accent-light: #f5f3ff; --accent-hover: #6d28d9;
    --text: #111827; --muted: #6b7280; --border: #e5e7eb;
    --shadow: 0 4px 24px rgba(0,0,0,.07); --radius: 14px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 62px;
  }
  .nav-brand { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -.3px; }
  .nav-brand span { color: #2563eb; }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { text-decoration: none; font-size: 13px; font-weight: 500; color: var(--muted); padding: 7px 14px; border-radius: 8px; transition: all .2s; }
  .nav-links a:hover { color: var(--text); background: var(--bg); }
  .nav-links a.active { color: var(--accent); background: var(--accent-light); }

  /* PAGE HERO */
  .page-hero { max-width: 1100px; margin: 0 auto; padding: 60px 40px 40px; }
  .page-tag { display: inline-flex; align-items: center; gap: 7px; background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 16px; }
  .page-tag::before { content: ''; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .page-hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
  .page-hero h1 span { color: var(--accent); }
  .page-hero p { font-size: 15px; color: var(--muted); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 0 40px 60px; }

  /* CARD */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

  /* UPLOAD */
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 40px 24px; text-align: center; transition: border-color .2s, background .2s; }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
  .upload-zone input { display: none; }
  .upload-zone label { cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--muted); }
  #file-name { font-size: 12px; color: var(--accent); margin-top: 10px; font-weight: 500; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; text-decoration: none; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(124,58,237,.3); }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #047857; transform: translateY(-1px); }
  .btn-orange { background: #d97706; color: #fff; }
  .btn-orange:hover { background: #b45309; transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ERROR */
  #error { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; }

  /* RESULT */
  .result-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .result-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* SEARCH */
  .search-wrap { margin-bottom: 16px; position: relative; }
  .search-wrap input { width: 100%; padding: 10px 16px 10px 38px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; background: var(--bg); }
  .search-wrap input:focus { border-color: var(--accent); background: var(--white); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }

  /* CLIENT GRID */
  .clients-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .client-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 22px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: all .2s; min-width: 0; overflow: hidden; }
  .client-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(124,58,237,.1); transform: translateY(-2px); }
  .client-info { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
  .client-avatar { width: 44px; height: 44px; border-radius: 12px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .client-text { min-width: 0; }
  .client-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-meta { font-size: 12px; color: var(--muted); }
  #notFound { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .page-hero, .main { padding-left: 16px; padding-right: 16px; }
    .page-hero h1 { font-size: 28px; }
    .clients-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="home.html">KFL <span>Organizer</span></a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="index.html">Date Separator</a>
    <a href="department.html">Client Separator</a>
    <a href="clientdate.html" class="active">Client + Date</a>
    <a href="home.html#about">About</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-tag">Client + Date Separator</div>
  <h1>Organize by <span>Client & Date</span></h1>
  <p>Upload your Excel file and get one file per client — each with sheets separated by date.</p>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Upload File</div>
    <div class="upload-zone">
      <label for="fileInput">
        <div class="upload-icon">📂</div>
        <h3>Click to upload your Excel file</h3>
        <p>Supports .xlsx, .xls</p>
        <p id="file-name"></p>
      </label>
      <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="updateFileName()">
    </div>
    <div style="margin-top:20px;">
      <button class="btn btn-primary" onclick="separate()">⚡ Separate by Client + Date</button>
    </div>
  </div>

  <div id="error"></div>

  <div class="card" id="resultCard" style="display:none;">
    <div class="result-header">
      <div class="result-title">Clients — Sheets by Date</div>
      <button class="btn btn-orange" onclick="downloadAll()">⬇ Download All as ZIP</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Search client or department…">
    </div>
    <div class="clients-grid" id="clientsGrid"></div>
    <div id="notFound">No clients match your search.</div>
  </div>

</div>

<script>
let clientData = {};
let cdHeaders = [];

function showError(msg) { const e = document.getElementById('error'); e.textContent = '⚠ ' + msg; e.style.display = 'block'; }
function clearError() { document.getElementById('error').style.display = 'none'; }
function updateFileName() {
  const f = document.getElementById('fileInput').files[0];
  document.getElementById('file-name').textContent = f ? '✓ ' + f.name : '';
}
function getInitials(name) {
  return name.split(/[\s>_-]/).filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
}
function normalizeDate(val) {
  if (val instanceof Date) return `${String(val.getDate()).padStart(2,'0')}-${String(val.getMonth()+1).padStart(2,'0')}-${val.getFullYear()}`;
  return String(val).replace(/\s+/g, '').trim();
}
function getFile() {
  const f = document.getElementById('fileInput').files[0];
  if (f) return f;
  const saved = sessionStorage.getItem('kfl_file');
  if (saved) {
    const bin = atob(saved);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const blob = new Blob([arr], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    return new File([blob], sessionStorage.getItem('kfl_filename') || 'file.xlsx');
  }
  showError('Please upload a file first.'); return null;
}

function separate() {
  clearError();
  const file = getFile(); if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const arr = new Uint8Array(e.target.result);
      // save to sessionStorage
      const str = btoa(arr.reduce((d,b) => d + String.fromCharCode(b), ''));
      sessionStorage.setItem('kfl_file', str);
      sessionStorage.setItem('kfl_filename', file.name);

      const wb = XLSX.read(arr, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const range = XLSX.utils.decode_range(ws['!ref']);

      // find header row by ID column
      let headerRow = 0;
      outer: for (let r = 0; r <= Math.min(10, range.e.r); r++)
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({r, c})];
          if (cell && /^id$/i.test(cell.v.toString().trim())) { headerRow = r; break outer; }
        }

      cdHeaders = [];
      for (let c = range.s.c; c <= range.e.c; c++) {
        const cell = ws[XLSX.utils.encode_cell({r: headerRow, c})];
        cdHeaders.push(cell ? cell.v.toString().trim() : '');
      }

      const deptIdx = cdHeaders.findIndex(h => /^department$/i.test(h));
      const dateIdx = cdHeaders.findIndex(h => /date/i.test(h));
      if (deptIdx === -1) { showError('No "Department" column found.'); return; }
      if (dateIdx === -1) { showError('No "Date" column found.'); return; }

      clientData = {};
      for (let r = headerRow + 1; r <= range.e.r; r++) {
        const deptCell = ws[XLSX.utils.encode_cell({r, c: deptIdx})];
        const dateCell = ws[XLSX.utils.encode_cell({r, c: dateIdx})];
        if (!deptCell) continue;
        const deptVal = deptCell.v.toString().trim().toUpperCase();
        const client = deptVal.includes('AGRI-EXIM>PROJECT-BASE') ? 'PROJECT-BASE' : deptVal.includes('AGRI-EXIM') ? 'AGRI-EXIM' : deptCell.v.toString().trim();
        const date = dateCell ? normalizeDate(dateCell.v) : 'Unknown';
        if (!clientData[client]) clientData[client] = {};
        if (!clientData[client][date]) clientData[client][date] = [];
        const rowData = [];
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({r, c})];
          rowData.push(cell ? (cell.v instanceof Date ? normalizeDate(cell.v) : cell.v) : '');
        }
        clientData[client][date].push(rowData);
      }

      renderCards();
    } catch(err) { showError(err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function renderCards() {
  const grid = document.getElementById('clientsGrid');
  grid.innerHTML = '';
  Object.keys(clientData).forEach(client => {
    const dates = Object.keys(clientData[client]);
    const total = dates.reduce((s, d) => s + clientData[client][d].length, 0);
    const card = document.createElement('div');
    card.className = 'client-card';
    card.dataset.name = client.toLowerCase();
    card.innerHTML = `
      <div class="client-info">
        <div class="client-avatar">${getInitials(client)}</div>
        <div class="client-text">
          <div class="client-name" title="${client}">${client}</div>
          <div class="client-meta">${total} records · ${dates.length} date${dates.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <button class="btn btn-success" style="padding:7px 14px;font-size:12px;flex-shrink:0;" onclick="downloadClient('${client.replace(/'/g, "\\'")}')">⬇ Download</button>`;
    grid.appendChild(card);
  });
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('notFound').style.display = 'none';
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('.client-card');
  let any = false;
  cards.forEach(c => { const match = c.dataset.name.includes(q); c.style.display = match ? '' : 'none'; if (match) any = true; });
  document.getElementById('notFound').style.display = any ? 'none' : 'block';
}

function downloadClient(client) {
  const wb = XLSX.utils.book_new();
  Object.keys(clientData[client]).sort().forEach(date => {
    const ws = XLSX.utils.aoa_to_sheet([cdHeaders, ...clientData[client][date]]);
    XLSX.utils.book_append_sheet(wb, ws, date.replace(/[\/\\:?*\[\]]/g, '-'));
  });
  XLSX.writeFile(wb, `${client.replace(/[^a-zA-Z0-9]/g,'_')}_ByDate.xlsx`);
}

async function downloadAll() {
  if (!Object.keys(clientData).length) { showError('Please separate the file first.'); return; }
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Creating ZIP…';
  try {
    const zip = new JSZip();
    Object.keys(clientData).forEach(client => {
      const wb = XLSX.utils.book_new();
      Object.keys(clientData[client]).sort().forEach(date => {
        const ws = XLSX.utils.aoa_to_sheet([cdHeaders, ...clientData[client][date]]);
        XLSX.utils.book_append_sheet(wb, ws, date.replace(/[\/\\:?*\[\]]/g, '-'));
      });
      zip.file(`${client.replace(/[^a-zA-Z0-9]/g,'_')}_ByDate.xlsx`, XLSX.write(wb, { bookType: 'xlsx', type: 'array' }));
    });
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `KFL_ClientDate_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
  } catch(e) { showError(e.message); }
  finally { btn.disabled = false; btn.textContent = '⬇ Download All as ZIP'; }
}

// Auto-load from sessionStorage
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('kfl_file');
  const savedName = sessionStorage.getItem('kfl_filename');
  if (!saved || !savedName) return;
  document.getElementById('file-name').textContent = '✓ ' + savedName + ' (auto-loaded)';
});
</script>
</body>
</html>
